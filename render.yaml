services:
  - type: web
    name: moodmix-api
    env: node
    region: oregon
    buildCommand: echo "Skipping frontend build for API server"
    startCommand: node server/llmProxy.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SILICONFLOW_API_KEY
        sync: false
      - key: SILICONFLOW_MODEL
        value: Qwen/Qwen2.5-72B-Instruct
      - key: PROXY_PORT
        value: 3001
    autoDeploy: true

  - type: static
    name: moodmix-frontend
    buildCommand: npm run build
    staticPublishPath: ./build
    autoDeploy: true
